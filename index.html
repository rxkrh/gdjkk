<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>껌딱지 꼬꼬 V5.5</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="koko.png">
</head>
<body class="font-normal">
    <div class="app-container">
        <header class="top-bar">
            <div style="display:flex; flex-direction:column; gap:8px; align-items:center; width:40px;">
                <button id="menu-open-btn" class="icon-btn"><img src="icon-menu.png" class="ui-icon" alt="메뉴"></button>
                <button id="icon-game" class="icon-btn" style="display:none; background:white; border-radius:50%; width:36px; height:36px; box-shadow:0 2px 5px rgba(0,0,0,0.1); justify-content:center; align-items:center; padding:0;">
                    <img src="icon-game.png" class="ui-icon" style="margin:0; width:20px; height:20px;" alt="게임">
                </button>
            </div>
            <div class="top-right-icons" id="top-shortcut-area">
                <span class="weather-info" id="icon-weather"><img src="icon-sun.png" class="ui-icon" id="weather-icon-img"> 날씨 로딩중...</span>
                <button id="icon-fortune" class="icon-btn"><img src="icon-fortune.png" class="ui-icon" alt="운세"></button>
            </div>
        </header>

        <div id="side-menu-overlay" class="overlay"></div>
        <aside id="side-menu" class="side-menu">
            <div class="menu-header"><h2>메뉴</h2><button id="menu-close-btn" class="icon-btn">❌</button></div>
            <div class="menu-content">
                <div class="menu-section">
                    <h3>⚙️ 꼬꼬 설정</h3>
                    <div class="setting-item" style="flex-direction: column; gap: 8px;">
                        <select id="font-select"></select>
                        <select id="size-select">
                            <option value="font-xsmall">매우 작게</option>
                            <option value="font-small">작게</option>
                            <option value="font-normal" selected>보통</option>
                            <option value="font-large">크게</option>
                            <option value="font-xlarge">매우 크게</option>
                        </select>
                        <button id="enable-push-btn" class="action-btn">🔔 알림 켜기</button>
                    </div>
                </div>
                </div>
        </aside>

        <main class="koko-zone" id="koko-zone-main">
            <div class="speech-bubble" id="koko-speech">주인님, 반가워요! 삐약!</div>
            <img src="koko.png" alt="꼬꼬" class="koko-character" id="koko">
        </main>

        <section class="tab-container" id="main-tab-container">
            <div class="tab-drag-handle" id="tab-drag-handle"><div class="drag-handle-pill"></div></div>
            <div class="tab-buttons" id="main-tab-buttons"></div>

            <div id="game-list-view" class="tab-content flex-column-tab" style="display:none; padding-top:0;">
                <div style="display:flex; flex-direction:column; width:100%; border-bottom: 1px solid #eee; margin-bottom: 15px; padding-bottom: 8px;">
                    <h3 style="text-align:center; margin: 10px 0; color:#555; font-size: 1.1em;">게임 목록</h3>
                    <button id="close-game-list-btn" style="background:none; border:none; font-size:0.8em; font-weight:bold; color:#888; cursor:pointer; align-self: flex-start;">⬅️ 뒤로가기</button>
                </div>
                <div class="scroll-wrapper" style="display: flex; flex-wrap: wrap; gap: 20px;">
                    <div id="play-minesweeper-list-btn" class="game-item-card">
                        <div class="game-item-icon"><img src="egg.png" style="width:40px;"></div>
                        <span class="game-item-title">달걀 지뢰찾기</span>
                    </div>
                </div>
            </div>

            <div id="tab-todo" class="tab-content active flex-column-tab">...</div>
        </section>

        <div id="fullscreen-game-overlay" class="fullscreen-overlay">
            <button id="game-close-x" class="game-exit-btn">❌</button>
            
            <div class="game-header">
                <div class="header-unit">
                    <span class="header-label" style="color:#0984e3;">타이머</span>
                    <span id="game-timer" class="header-value">000</span>
                </div>
                <div class="header-unit">
                    <span class="header-label" style="color:#e74c3c;">남은 지뢰 개수</span>
                    <span id="game-mine-count" class="header-value">00</span>
                </div>
            </div>

            <div id="game-stage" class="game-stage">
                </div>

            <div id="difficulty-popup" class="difficulty-container">
                <h2 style="margin-bottom:20px;">난이도 선택</h2>
                <div class="diff-btns">
                    <button onclick="initMinesweeper('easy')">쉬움</button>
                    <button onclick="initMinesweeper('normal')">보통</button>
                    <button onclick="initMinesweeper('hard')">어려움</button>
                </div>
                <div class="custom-settings">
                    <p style="font-weight:bold; margin:15px 0 10px 0;">사용자 지정 게임</p>
                    <div class="range-group">
                        <label>행/열: <span id="val-size">10</span></label>
                        <input type="range" id="input-size" min="5" max="15" value="10">
                    </div>
                    <div class="range-group">
                        <label>달걀 개수: <span id="val-mines">10</span></label>
                        <input type="range" id="input-mines" min="3" max="50" value="10">
                    </div>
                    <button class="action-btn" onclick="initMinesweeper('custom')" style="margin-top:10px;">게임 시작</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
